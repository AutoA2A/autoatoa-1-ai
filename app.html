<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI教学互动小工具</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
    --primary:#4a90e2;
    --primary-dark:#357ab8;
    --success:#7ed321;
    --danger:#f80032;
    --bg:#f5f7fa;
    --card-bg:#fff;
    --text:#333;
    --muted:#777;
    --shadow:0 2px 6px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:system-ui,Arial,sans-serif;
    background:#fafafa;
    color:var(--text);
    line-height:1.5;
}
header{
    background:var(--primary);
    color:#fff;
    padding:1rem;
    text-align:center;
    position:sticky;
    top:0;
    z-index:10;
}
header h1{font-size:1.5rem;margin-bottom:.3rem}
header p{font-size:.9rem;opacity:.9}
.tab-bar{
    display:flex;
    background:#fff;
    border-bottom:1px solid #e0e0e0;
    position:sticky;
    top:3.5rem;
    z-index:9;
}
.tab-btn{
    flex:1;
    padding:.8rem;
    border:none;
    background:none;
    font-size:1rem;
    cursor:pointer;
    color:var(--muted);
    transition:color .2s,border-bottom .2s;
}
.tab-btn.active{
    color:var(--primary);
    border-bottom:3px solid var(--primary);
}
.tab-content{padding:1rem;display:none}
.tab-content.active{display:block}
.card-grid{
    display:grid;
    gap:1rem;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}
.card{
    background:var(--card-bg);
    border-radius:8px;
    padding:1rem;
    box-shadow:var(--shadow);
    transition:transform .2s;
}
.card:hover{transform:translateY(-4px)}
.card h3{margin-bottom:.5rem;color:var(--primary)}
.btn{
    display:inline-block;
    padding:.5rem 1rem;
    margin-top:.5rem;
    border:none;
    border-radius:4px;
    background:var(--primary);
    color:#fff;
    cursor:pointer;
    font-size:.9rem;
    transition:background .2s;
}
.btn:hover{background:var(--primary-dark)}
.btn:disabled{background:#ccc;cursor:not-allowed}
.options label{
    display:block;
    background:#f9f9f9;
    margin:.5rem 0;
    padding:.6rem;
    border-radius:4px;
    cursor:pointer;
    border:1px solid #ddd;
}
.options label:hover{background:#eee}
.options input{margin-right:.5rem}
#stats{font-weight:bold;margin-top:1rem}
#explanation{margin-top:1rem;padding:.8rem;background:#fff8e1;border-left:4px solid #ffb300;display:none}
#game-area{
    position:relative;
    width:100%;
    max-width:400px;
    margin:0 auto;
    aspect-ratio:1;
    background:#ddd;
    border-radius:8px;
    overflow:hidden;
}
.mole{
    position:absolute;
    width:60px;
    height:60px;
    background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="%238bc34a"/><circle cx="20" cy="20" r="4" fill="%23fff"/><circle cx="44" cy="20" r="4" fill="%23fff"/><path d="M20 38 q0 -8 8 -8 t8 8" stroke="%23fff" stroke-width="4" fill="none"/></svg>') center/contain no-repeat;
    cursor:pointer;
    transition:transform .2s;
}
.mole:active{transform:scale(.9)}
#timer,#score{font-size:1.2rem;font-weight:bold;margin:.5rem 0;text-align:center}
footer{text-align:center;padding:1rem;font-size:.8rem;color:#777}
@media(max-width:480px){
    header h1{font-size:1.2rem}
    .tab-btn{font-size:.9rem;padding:.6rem}
}
</style>
</head>
<body>
<header>
    <h1>AI教学互动小工具</h1>
    <p>随堂答题 • 知识点卡片 • 趣味课堂游戏</p>
</header>
<div class="tab-bar">
    <button class="tab-btn active" data-tab="quiz">答题</button>
    <button class="tab-btn" data-tab="cards">知识点卡片</button>
    <button class="tab-btn" data-tab="game">课堂游戏</button>
</div>

<!-- Quiz Content -->
<div id="quiz-content" class="tab-content active">
    <div id="quiz-question"></div>
    <div id="quiz-options" class="options"></div>
    <button id="quiz-next" class="btn" disabled>下一题</button>
    <div id="stats">正确率：0%</div>
    <div id="explanation"></div>
</div>

<!-- Knowledge Cards Content -->
<div id="cards-content" class="tab-content">
    <div class="card-grid" id="cards-container"></div>
</div>

<!-- Game Content -->
<div id="game-content" class="tab-content">
    <div id="game-area"></div>
    <div>
        <span id="timer">时间：30</span> |
        <span id="score">得分：0</span>
    </div>
    <button id="game-start" class="btn">开始游戏</button>
</div>

<footer>
    © 2025 AI教学互动小工具 · 纯前端实现，可直接托管于 GitHub Pages
</footer>

<script>
/* ========== 数据 ========== */
const questions = [
    {
        q:"以下哪项是人工智能的核心技术？",
        options:["区块链","机器学习","量子计算","云存储"],
        answer:1,
        explanation:"机器学习是人工智能的核心，使系统能够从数据中学习并改进性能。"
    },
    {
        q:"在监督学习中，训练数据需要什么？",
        options:["只有输入特征","只有输出标签","输入特征和对应的输出标签","不需要任何数据"],
        answer:2,
        explanation:"监督学习需要带有标签的数据，即每个输入都有对应的正确输出。"
    },
    {
        q:"哪种算法常用于图像识别？",
        options:["线性回归","决策树","卷积神经网络 (CNN)","K近邻"],
        answer:2,
        explanation:"卷积神经网络通过局部感受野和权重共享，擅长处理二维图像数据。"
    },
    {
        q:"过拟合意味着模型在什么情况下表现不好？",
        options:["训练集","验证集","两者都好","两者都不好"],
        answer:1,
        explanation:"过拟合模型在训练集上表现很好，但在未见数据（验证/测试集）上表现差。"
    },
    {
        q:"强化学习的目标是最大化什么？",
        options:["即时奖励","长期累积奖励","模型准确率","数据覆盖率"],
        answer:1,
        explanation:"强化学习通过试错学习策略，目标是最大化长期累积奖励。"
    }
];

const cards = [
    {title:"什么是机器学习？",content:"机器学习是人工智能的一个分支，通过算法让计算机从数据中学习规律，而无需显式编程。"},
    {title:"深度学习简介",content:"深度学习使用多层人工神经网络（深度网络）来自动学习数据的层次特征，尤其在图像、语音和自然语言处理方面表现出色。"},
    {title:"常见的评价指标",content:"准确率、精确率、召回率、F1值、AUC-ROC等是评价分类模型性能的常用指标。"},
    {title:"数据预处理步骤",content:"包括数据清洗、缺失值处理、特征缩放、编码分类变量、特征选择等，是建模前的重要环节。"},
    {title:"模型调参技巧",content:"网格搜索、随机搜索、贝叶斯优化以及自动机器学习（AutoML）是常用的超参数调优方法。"}
];

/* ========== 状态变量 ========== */
let currentQIndex = 0;
let scoreCorrect = 0;
let scoreTotal = 0;
let gameActive = false;
let gameTimeLeft = 30;
let gameScore = 0;
let gameTimerId = null;
let moleTimeoutId = null;

/* ========== DOM 元素 ========== */
const tabBtns = document.querySelectorAll('.tab-btn');
const tabContents = document.querySelectorAll('.tab-content');
const quizQuestionEl = document.getElementById('quiz-question');
const quizOptionsEl = document.getElementById('quiz-options');
const quizNextBtn = document.getElementById('quiz-next');
const statsEl = document.getElementById('stats');
const explanationEl = document.getElementById('explanation');
const cardsContainer = document.getElementById('cards-container');
const gameAreaEl = document.getElementById('game-area');
const timerEl = document.getElementById('timer');
const scoreEl = document.getElementById('score');
const gameStartBtn = document.getElementById('game-start');

/* ========== 功能函数 ========== */
function showTab(tabName){
    tabBtns.forEach(btn=>btn.classList.toggle('active', btn.dataset.tab===tabName));
    tabContents.forEach(c=>c.classList.toggle('active', c.id===tabName+'-content'));
}
function loadQuestion(){
    const q = questions[currentQIndex];
    quizQuestionEl.textContent = `${currentQIndex+1}. ${q.q}`;
    quizOptionsEl.innerHTML = '';
    q.options.forEach((opt,i)=>{
        const label = document.createElement('label');
        label.innerHTML = `<input type="radio" name="answer" value="${i}"> ${opt}`;
        quizOptionsEl.appendChild(label);
    });
    quizNextBtn.disabled = true;
    explanationEl.style.display = 'none';
}
function checkAnswer(){
    const selected = document.querySelector('input[name="answer"]:checked');
    if(!selected) return alert('请先选择一个答案');
    const choice = Number(selected.value);
    const correct = questions[currentQIndex].answer;
    
    scoreTotal++; // 每答一题增加总数
    
    document.querySelectorAll('input[name="answer"]').forEach(inp=>inp.disabled=true);
    if(choice===correct){
        scoreCorrect++;
        alert('正确！');
    }else{
        explanationEl.textContent = questions[currentQIndex].explanation;
        explanationEl.style.display = 'block';
        alert('错误，请查看解析。');
    }
    updateStats();
    quizNextBtn.disabled = false;
}
function updateStats(){
    const rate = scoreTotal===0 ? 0 : Math.round((scoreCorrect/scoreTotal)*100);
    statsEl.textContent = `正确率：${rate}% (${scoreCorrect}/${scoreTotal})`;
}
function nextQuestion(){
    currentQIndex++;
    if(currentQIndex>=questions.length){
        alert('所有题目已完成！');
        currentQIndex = 0;
        scoreCorrect = 0;
        scoreTotal = 0;
        updateStats();
    }
    loadQuestion();
}
function renderCards(){
    cardsContainer.innerHTML = '';
    cards.forEach(c=>{
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h3>${c.title}</h3><p>${c.content}</p>`;
        cardsContainer.appendChild(div);
    });
}
function startGame(){
    if(gameActive) return;
    gameActive = true;
    gameTimeLeft = 30;
    gameScore = 0;
    timerEl.textContent = `时间：${gameTimeLeft}`;
    scoreEl.textContent = `得分：${gameScore}`;
    gameStartBtn.disabled = true;
    gameTimerId = setInterval(()=>{
        gameTimeLeft--;
        timerEl.textContent = `时间：${gameTimeLeft}`;
        if(gameTimeLeft<=0){
            endGame();
        }
    },1000);
    showMole();
}
function endGame(){
    gameActive = false;
    clearInterval(gameTimerId);
    clearTimeout(moleTimeoutId);
    gameAreaEl.innerHTML = '';
    gameStartBtn.disabled = false;
    alert(`游戏结束！你的得分是 ${gameScore}`);
}
function showMole(){
    if(!gameActive) return;
    // 清除之前的地鼠
    gameAreaEl.innerHTML = '';
    // 随机位置
    const size = 60; // 地鼠大小
    const maxX = gameAreaEl.clientWidth - size;
    const maxY = gameAreaEl.clientHeight - size;
    const posX = Math.max(0, Math.random()*maxX);
    const posY = Math.max(0, Math.random()*maxY);
    const mole = document.createElement('div');
    mole.className = 'mole';
    mole.style.left = `${posX}px`;
    mole.style.top = `${posY}px`;
    mole.onclick = ()=>{
        gameScore++;
        scoreEl.textContent = `得分：${gameScore}`;
        mole.remove();
        // 立即出现新地鼠
        clearTimeout(moleTimeoutId);
        showMole();
    };
    gameAreaEl.appendChild(mole);
    // 设定一定时间后自动消失并出现新地鼠
    moleTimeoutId = setTimeout(()=>{
        if(gameActive){
            mole.remove();
            showMole();
        }
    },800);
}

/* ========== 事件绑定 ========== */
tabBtns.forEach(btn=>{
    btn.addEventListener('click',()=>showTab(btn.dataset.tab));
});
quizNextBtn.addEventListener('click',nextQuestion);
quizOptionsEl.addEventListener('click',e=>{
    if(e.target.type==='radio'){
        // 延迟一下让选中状态更新，然后判断
        setTimeout(()=>{
            if(document.querySelector('input[name="answer"]:checked')){
                checkAnswer();
            }
        },100);
    }
});
gameStartBtn.addEventListener('click',startGame);
renderCards();
loadQuestion();
updateStats();
</script>
</body>
</html>
